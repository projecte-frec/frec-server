services:
  agent_server:
    image: agent_server
    build:
      context: ..
      dockerfile: ./docker/agent_server/Dockerfile
    volumes:
      - type: bind
        source: ../agents
        target: /app/agents
        read_only: true
    working_dir: /app/agents
    command: ["adk", "api_server", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - frec_deploy_network