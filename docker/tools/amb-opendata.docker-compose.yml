services:
  mcp_amb_opendata:
    image: frec_server
    build:
      context: ..
      dockerfile: ./docker/frec_server/Dockerfile
    volumes:
      - type: bind
        source: ..
        target: /app
    command: ["python", "mcp_servers/amb_noticies.py"]
    networks:
      - frec_deploy_network
