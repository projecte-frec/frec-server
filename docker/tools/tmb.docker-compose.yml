services:
  mcp_tmb:
      image: frec_server
      build:
        context: ..
        dockerfile: ./docker/frec_server/Dockerfile
      volumes:
        - type: bind
          source: ..
          target: /app
      command: ["python", "mcp_servers/tmb/tmb_mcp.py"]
      networks:
        - frec_deploy_network
